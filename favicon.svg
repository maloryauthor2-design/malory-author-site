<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Dark background — matches site colour exactly -->
  <rect width="100" height="100" rx="18" fill="#0d1015"/>

  <!-- Subtle gold border — gives the premium "seal" feel -->
  <rect x="3" y="3" width="94" height="94" rx="15" fill="none" stroke="#d4af37" stroke-width="2.5" opacity="0.55"/>

  <!-- Inner glow behind the M -->
  <ellipse cx="50" cy="54" rx="28" ry="24" fill="#d4af37" opacity="0.07"/>

  <!-- The M — bold serif to echo the blackletter spirit, crisp at all sizes -->
  <text
    x="50"
    y="76"
    font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', Palatino, serif"
    font-size="66"
    font-weight="bold"
    fill="#d4af37"
    text-anchor="middle"
    dominant-baseline="auto"
  >M</text>

</svg>