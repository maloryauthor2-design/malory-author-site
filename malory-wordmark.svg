<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&amp;display=swap');
      .name { font-family: 'Fraunces', Georgia, serif; font-weight: 600; letter-spacing: 0.04em; }
    </style>
  </defs>

  <!-- Transparent background; reads on dark surface -->

  <!-- Author name, cream on transparent -->
  <text x="400" y="155" text-anchor="middle" class="name" font-size="130" fill="#E8E0CC">Malory</text>

  <!-- Brass underline rule, 60% width of the name -->
  <line x1="250" y1="195" x2="550" y2="195" stroke="#C9A85A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Kicker beneath -->
  <text x="400" y="232" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" letter-spacing="0.28em" fill="#9AA0A8">SCI-FI  ·  LITRPG  ·  PROGRESSION</text>
</svg>
