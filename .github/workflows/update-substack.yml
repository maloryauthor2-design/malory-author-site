name: Refresh Substack posts

on:
  schedule:
    - cron: "10 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: substack-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bake latest Substack posts into index.html
        run: python3 .github/scripts/update_substack.py

      - name: Commit & push if the posts changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No change — homepage already shows the latest posts."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto: refresh homepage Substack posts"
            git push
          fi
